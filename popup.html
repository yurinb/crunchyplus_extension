<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crunchy+</title>
    <link rel="stylesheet" href="popup.css" />
  </head>

  <body>
    <header>
      <div class="logo">
        <img class="logo-icon" src="icons/icon32.png" alt="Crunchy+ icon" />
        <span>Crunchy+</span>
      </div>
      <div class="header-links">
        <a
          class="github-link"
          href="https://www.buymeacoffee.com/yurinb"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Support Crunchy+ on Buy Me a Coffee"
          title="Buy Me a Coffee"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 9.5h11v5a4.5 4.5 0 0 1-4.5 4.5h-2A4.5 4.5 0 0 1 4 14.5v-5z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            <path d="M15 11h1.6a2.4 2.4 0 1 1 0 4.8H15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M5 20h9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M8 6.8c0-.9.7-1.3 1.2-1.8.6-.5 1.2-1 .9-2" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M11 7.4c0-.8.6-1.2 1.1-1.7.5-.4 1-.9.8-1.8" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </a>
        <a
          class="github-link"
          href="https://github.com/yurinb/crunchyplus_extension"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Open Crunchy+ GitHub repository"
          title="GitHub"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M12 .5C5.65.5.5 5.65.5 12c0 5.1 3.3 9.42 7.88 10.95.58.1.8-.26.8-.57 0-.28-.01-1.03-.02-2.03-3.2.7-3.88-1.54-3.88-1.54-.52-1.34-1.28-1.7-1.28-1.7-1.05-.72.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.03 1.76 2.7 1.25 3.36.95.1-.74.4-1.25.73-1.53-2.56-.3-5.25-1.28-5.25-5.68 0-1.26.45-2.3 1.18-3.1-.12-.3-.5-1.5.12-3.13 0 0 .97-.3 3.18 1.18.93-.25 1.92-.37 2.9-.37.98 0 1.97.12 2.9.37 2.2-1.5 3.17-1.18 3.17-1.18.63 1.63.24 2.83.12 3.13.74.8 1.18 1.84 1.18 3.1 0 4.4-2.7 5.37-5.27 5.66.42.36.78 1.06.78 2.13 0 1.54-.01 2.78-.01 3.16 0 .32.2.68.8.57A11.51 11.51 0 0 0 23.5 12c0-6.35-5.15-11.5-11.5-11.5z"
            />
          </svg>
        </a>
      </div>
    </header>

    <main>
      <section class="feature-block" id="section-theme">
        <div class="feature-header">
          <div class="feature-title">
            <span class="feature-icon">🎨</span>
            <span>Theme Settings</span>
            <span
              class="info-icon"
              title="Choose one of the predefined visual color themes."
              >?</span
            >
          </div>
        </div>

        <div class="collapsible-section" id="themeConfig" style="display: none">
          <div class="config-label">Color Themes</div>
          <div class="theme-cards" id="themePresetCards">
            <label class="theme-card" for="themePresetCrunchy">
              <input
                type="radio"
                name="themePreset"
                id="themePresetCrunchy"
                value="crunchy-classic"
                checked
              />
              <span class="theme-card-preview">
                <span class="swatch" style="--swatch: #f47521"></span>
                <span class="swatch" style="--swatch: #ffffff"></span>
                <span
                  class="swatch"
                  style="--swatch: rgba(244, 117, 33, 0.15)"
                ></span>
              </span>
              <span class="theme-card-name">Crunchy Classic</span>
            </label>

            <label class="theme-card" for="themePresetOcean">
              <input
                type="radio"
                name="themePreset"
                id="themePresetOcean"
                value="ocean-arc"
              />
              <span class="theme-card-preview">
                <span class="swatch" style="--swatch: #118ab2"></span>
                <span class="swatch" style="--swatch: #ffffff"></span>
                <span
                  class="swatch"
                  style="--swatch: rgba(17, 138, 178, 0.18)"
                ></span>
              </span>
              <span class="theme-card-name">Ocean Arc</span>
            </label>

            <label class="theme-card" for="themePresetEmerald">
              <input
                type="radio"
                name="themePreset"
                id="themePresetEmerald"
                value="emerald-pop"
              />
              <span class="theme-card-preview">
                <span class="swatch" style="--swatch: #0fa968"></span>
                <span class="swatch" style="--swatch: #ffffff"></span>
                <span
                  class="swatch"
                  style="--swatch: rgba(15, 169, 104, 0.18)"
                ></span>
              </span>
              <span class="theme-card-name">Emerald Pop</span>
            </label>

            <label class="theme-card" for="themePresetRuby">
              <input
                type="radio"
                name="themePreset"
                id="themePresetRuby"
                value="ruby-night"
              />
              <span class="theme-card-preview">
                <span class="swatch" style="--swatch: #d64545"></span>
                <span class="swatch" style="--swatch: #ffffff"></span>
                <span
                  class="swatch"
                  style="--swatch: rgba(214, 69, 69, 0.18)"
                ></span>
              </span>
              <span class="theme-card-name">Ruby Night</span>
            </label>
          </div>

          <div class="config-label" style="margin-top: 14px">
            Buttons & Icons
          </div>
          <div class="advanced-grid">
            <div class="advanced-row">
              <label>Button Horizontal Padding</label>
              <input type="text" id="buttonPaddingX" placeholder="12px" />
            </div>
            <div class="advanced-row">
              <label>Hover Transition (ms)</label>
              <input
                type="number"
                id="buttonHoverTransitionMs"
                min="50"
                max="1000"
                step="50"
              />
            </div>
            <div class="advanced-row">
              <label>Icon Size</label>
              <input type="text" id="iconSize" placeholder="24px" />
            </div>
          </div>

          <div class="config-label" style="margin-top: 14px">
            Toast Layout & Effects
          </div>
          <div class="advanced-grid">
            <div class="advanced-row">
              <label>Toast Position</label>
              <select id="toastPositionPreset">
                <option value="top-left">◤ Top Left</option>
                <option value="top-right">Top Right ◥</option>
                <option value="bottom-left" selected>◣ Bottom Left</option>
                <option value="bottom-right">Bottom Right ◢</option>
                <option value="on-action">◎ On Action Element</option>
              </select>
            </div>
            <div class="advanced-row">
              <label>Toast Inset</label>
              <input type="text" id="toastInset" placeholder="20px" />
            </div>
            <div class="advanced-row">
              <label>Animation Duration (ms)</label>
              <input
                type="number"
                id="toastAnimationMs"
                min="100"
                max="1000"
                step="50"
              />
            </div>
            <div class="advanced-row">
              <label>Toast Gap</label>
              <input type="text" id="toastGap" placeholder="8px" />
            </div>
            <div class="advanced-row">
              <label>Toast Padding</label>
              <input type="text" id="toastPadding" placeholder="12px 16px" />
            </div>
            <div class="advanced-row">
              <label>Toast Border Radius</label>
              <input type="text" id="toastBorderRadius" placeholder="4px" />
            </div>
            <div class="advanced-row">
              <label>Toast Font Size</label>
              <input type="text" id="toastFontSize" placeholder="13px" />
            </div>
            <div class="advanced-row">
              <label>Toast Font Weight</label>
              <input type="text" id="toastFontWeight" placeholder="600" />
            </div>
            <div class="advanced-row">
              <label>Toast Box Shadow</label>
              <input
                type="text"
                id="toastBoxShadow"
                placeholder="0 4px 12px rgba(0,0,0,0.5)"
              />
            </div>
            <div class="advanced-row">
              <label>Progress Track Color</label>
              <input
                type="text"
                id="toastProgressTrackColor"
                placeholder="rgba(255,255,255,0.25)"
              />
            </div>
            <div class="advanced-row">
              <label>Progress Bar Color</label>
              <input
                type="text"
                id="toastProgressBarColor"
                placeholder="rgba(255,255,255,0.95)"
              />
            </div>
          </div>

          <div class="actions">
            <button class="btn-secondary" id="resetTheme">
              Reset Theme Defaults
            </button>
          </div>
        </div>
      </section>

      <section class="feature-block" id="section-autoskip">
        <div class="feature-header">
          <div class="feature-title">
            <span class="feature-icon">⏭</span>
            <span>Auto-Skip</span>
            <span
              class="info-icon"
              title="Automatically clicks Skip Intro, Skip Recap, Skip Credits buttons."
              >?</span
            >
          </div>
          <label class="toggle">
            <input type="checkbox" id="autoSkipEnabled" />
            <span class="slider"></span>
          </label>
        </div>

        <div
          class="collapsible-section"
          id="autoSkipConfig"
          style="display: none"
        >
          <div class="config-label">
            Skip Button Selectors
            <span class="hint">(one per line, CSS selectors)</span>
          </div>
          <textarea
            id="autoSkipSelectors"
            rows="7"
            spellcheck="false"
          ></textarea>
          <div class="actions">
            <button class="btn-secondary" id="resetAutoSkipSelectors">
              Reset to defaults
            </button>
          </div>
        </div>
      </section>

      <section class="feature-block" id="section-episodenav">
        <div class="feature-header">
          <div class="feature-title">
            <span class="feature-icon">🎬</span>
            <span>Episode Navigation</span>
            <span
              class="info-icon"
              title="Adds Next / Previous Episode buttons directly on the player."
              >?</span
            >
          </div>
          <label class="toggle">
            <input type="checkbox" id="episodeNavEnabled" />
            <span class="slider"></span>
          </label>
        </div>

        <div
          class="collapsible-section"
          id="episodeNavConfig"
          style="display: none"
        >
          <div class="config-label">Next Episode Selector</div>
          <input type="text" id="nextSelector" spellcheck="false" />

          <div class="config-label" style="margin-top: 10px">
            Previous Episode Selector
          </div>
          <input type="text" id="prevSelector" spellcheck="false" />

          <div class="actions">
            <button class="btn-secondary" id="resetEpisodeNavSelectors">
              Reset selectors
            </button>
          </div>
        </div>
      </section>

      <section class="feature-block" id="section-advanced">
        <div class="feature-header">
          <div class="feature-title">
            <span class="feature-icon">⚙️</span>
            <span>Advanced Settings</span>
            <span
              class="info-icon"
              title="Customize timing, animation, colors and other advanced behavior."
              >?</span
            >
          </div>
        </div>

        <div
          class="collapsible-section"
          id="advancedConfig"
          style="display: none"
        >
          <div class="config-label">Timing & Intervals</div>
          <div class="advanced-grid">
            <div class="advanced-row">
              <label>Auto-Skip Check Interval (ms)</label>
              <input
                type="number"
                id="skipIntervalMs"
                min="100"
                max="5000"
                step="50"
              />
            </div>
            <div class="advanced-row">
              <label>Skip Cooldown (ms)</label>
              <input
                type="number"
                id="skipCooldownMs"
                min="500"
                max="10000"
                step="100"
              />
            </div>
            <div class="advanced-row">
              <label>Navigation Debounce (ms)</label>
              <input
                type="number"
                id="navDebounceMs"
                min="100"
                max="2000"
                step="50"
              />
            </div>
            <div class="advanced-row">
              <label>Pre-Action Delay (ms)</label>
              <input
                type="number"
                id="actionDelayMs"
                min="0"
                max="8000"
                step="100"
              />
            </div>
            <div class="advanced-row">
              <label>Navigation Delay (ms)</label>
              <input
                type="number"
                id="navActionDelayMs"
                min="0"
                max="8000"
                step="100"
              />
            </div>
          </div>

          <div class="config-label" style="margin-top: 14px">Action Flow</div>
          <div class="advanced-grid">
            <div class="advanced-row">
              <label>Enable Toast</label>
              <select id="toastEnabled">
                <option value="true">Enabled</option>
                <option value="false">Disabled</option>
              </select>
            </div>
            <div class="advanced-row">
              <label>Toast Duration (ms)</label>
              <input
                type="number"
                id="toastDurationMs"
                min="500"
                max="8000"
                step="100"
              />
            </div>
          </div>

          <div class="actions">
            <button class="btn-secondary" id="resetAdvanced">
              Reset All to Defaults
            </button>
          </div>
        </div>
      </section>

    </main>

    <footer>
      <button class="btn-primary" id="saveBtn">Save Settings</button>
      <div class="save-status" id="saveStatus"></div>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
